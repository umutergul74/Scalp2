# ============================================================
# Scalp2 Configuration — BTC/USDT Swing Trading Framework (1H)
# ============================================================

data:
  symbol: "BTC/USDT"
  exchange: "binanceusdm"
  timeframes:
    primary: "1h"
    mtf: ["4h"]
  date_range:
    start: "2020-01-01"
    end: "2026-04-29"
  cache_dir: "./data/raw"
  processed_dir: "./data/processed"

features:
  wavelet:
    wavelet: "sym5"
    level: 4
    threshold_mode: "soft"
    window: 256
    apply_to: ["close", "volume"]

  technical:
    rsi_period: 14
    ema_periods: [9, 21, 55]
    macd: [12, 26, 9]
    bollinger:
      period: 20
      std: 2.0
    atr_period: 14
    stochastic:
      k: 14
      d: 3
      smooth: 3
    adx_period: 14

  volatility:
    garman_klass_window: 14
    parkinson_window: 14

  orderflow:
    true_orderflow: true
    whale_detector: true
    funding_rate: true
    open_interest: true

  smart_money:
    fvg_min_gap_pct: 0.001
    liquidity_sweep_lookback: 20
    vwap_session_hours: 24

labeling:
  method: "triple_barrier"
  tp_multiplier: 2.0
  sl_multiplier: 5.0
  max_holding_bars: 10
  min_return_threshold: 0.001
  atr_period: 14

model:
  seq_len: 64

  tcn:
    num_channels: [64, 128, 128, 128, 128]
    kernel_size: 3
    dropout: 0.3
    spatial_dropout: true
    squeeze_excite: true
    stochastic_depth: 0.1

  gru:
    hidden_size: 192
    num_layers: 3
    dropout: 0.3
    bidirectional: false
    attention_pooling: true

  fusion:
    latent_dim: 96
    bottleneck_dim: 48
    dropout: 0.4
    use_attention: false

  xgboost:
    objective: "multi:softprob"
    num_class: 3
    max_depth: 7
    n_estimators: 800
    learning_rate: 0.02
    subsample: 0.8
    colsample_bytree: 0.7
    min_child_weight: 5
    gamma: 0.05
    reg_alpha: 0.05
    reg_lambda: 1.0
    tree_method: "hist"
    device: "cpu"
    eval_metric: "mlogloss"
    early_stopping_rounds: 50

  bypass_xgboost: true    # Use raw TCN+GRU logits instead of XGBoost meta-learner
  handcrafted_top_k: 40

training:
  optimizer:
    type: "AdamW"
    lr: 5.0e-4
    weight_decay: 1.0e-3
    betas: [0.9, 0.999]

  scheduler:
    type: "CosineAnnealingWarmRestarts"
    patience: 5
    factor: 0.5
    min_lr: 1.0e-6
    T_0: 15
    T_mult: 2
    warmup_epochs: 5

  batch_size: 128
  max_epochs: 150
  gradient_clip_norm: 1.0
  use_amp: true

  early_stopping:
    patience: 10
    min_delta: 1.0e-5

  loss:
    primary: "cross_entropy"
    auxiliary: "sharpe"
    alpha_start: 0.7
    alpha_end: 0.3
    alpha_anneal_epochs: 30
    label_smoothing: 0.1
    contrastive_weight: 0.10
    contrastive_temp: 0.10
    focal_gamma: 1.0
    center_loss_weight: 0.0
    rank_ic_weight: 0.20
    rt_cost_bps: 8.0

  class_weights: "inverse_frequency"

  walk_forward:
    train_bars: 7560
    val_bars: 1080
    test_bars: 720
    purge_bars: 12
    embargo_bars: 3
    step_bars: 720

  scaler: "robust"

regime:
  version: "v2"
  n_states: 3
  features: ["log_return", "gk_vol_14", "adx", "cvd_delta_zscore", "vwap_dist_atr"]
  covariance_type: "full"
  n_iter: 100
  choppy_threshold: 0.50
  online_update_enabled: true
  online_decay_factor: 0.998
  online_update_interval: 24
  online_min_samples: 48

execution:
  time_of_day_filter:
    enabled: false
    blocked_hours_utc: [3, 4]

  confidence_threshold: 0.48
  max_trades_per_day: 8
  direction_filter: "long_only"
  min_adx: 20
  min_atr_percentile: 0.10
  choppy_adx_override: 22
  regime_direction_filter: false

  pyramiding:
    enabled: true
    max_concurrent_tranches: 20
    max_trades_per_day: 24
    base_position_size: 0.15
    high_conf_threshold: 0.55
    take_profit_pct: 0.020
    max_hold_bars: 24

  order_execution:
    order_type: "limit"
    maker_fee_bps: 2
    taker_fee_bps: 4
    slippage_bps: 2

  position_sizing:
    method: "fractional_kelly"
    max_fraction: 0.15
    kelly_fraction: 0.50
    leverage: 5
    maintenance_margin: 0.005

  trade_management:
    partial_tp_1_atr: 10.0
    partial_tp_1_pct: 0.0
    full_tp_atr: 10.0
    breakeven_trigger_atr: 10.0
    trailing_activation_atr: 10.0
    trailing_distance_atr: 10.0
    structural_exit:
      enabled: false
      fvg_proximity_atr: 0.3
      sweep_buffer_atr: 0.15
      vwap_margin_atr: 0.5
      max_sl_stretch_atr: 0.4
      normalize_risk: true       # Option A: shrink position when SL widens
    adaptive_tp_sl:
      enabled: true
      high_vol_pctile: 0.80
      low_vol_pctile: 0.30
      high_vol_tp_scale: 1.2
      high_vol_sl_scale: 1.1
      low_vol_tp_scale: 0.8
      low_vol_sl_scale: 0.85
    cooldown:
      enabled: true
      bars_after_sl: 2
      bars_after_regime_close: 1
    price_distance_block:
      enabled: false
      min_atr_distance: 0.5
    consecutive_sl_cap:
      enabled: false
      max_consecutive: 50
      reset_after_win: true

  risk_limits:
    daily_loss_limit_pct: 999.0
    weekly_loss_limit_pct: 999.0
    drawdown_halt_pct: 999.0
    win_streak_reduction:
      enabled: false
      after_wins: 5
      size_multiplier: 0.7

  slippage_model:
    base_bps: 2.0
    volatility_scale: 1.0
    enabled: true

  market_impact:
    base_impact_bps: 0.5
    reference_notional_usd: 100000.0
    enabled: true

  funding_rate:
    method: "fixed"
    fixed_rate_pct: 0.01
    enabled: true

  model_refresh:
    frequency: "weekly"
    min_sharpe_threshold: 0.5
    fallback: true

logging:
  level: "INFO"
  dir: "./logs"
  tensorboard: true

seed: 42
